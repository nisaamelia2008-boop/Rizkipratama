<DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Kartu Profil</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      width: 300px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
      padding: 20px;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .profile-img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #a6c1ee;
      margin-top: -50px;
      background: #ddd;
    }

    .name {
      font-size: 22px;
      font-weight: bold;
      margin-top: 10px;
    }

    .info {
      text-align: left;
      margin-top: 15px;
      font-size: 14px;
      line-height: 1.6;
    }

    .info span {
      font-weight: bold;
      color: #555;
    }

    .footer {
      margin-top: 15px;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>
<body>

<div class="card">
  <img src="R.jpg" alt="Foto Profil" class="profile-img">

  <div class="name">Rizki Pratama</div>

  <div class="info">
    <p><span>Tempat tanggal lahir:</span> Cilacap, 23 Mei 2008</p>
    <p><span>Hobi:</span> Mendaki</p>
    <p><span>Alamat:</span> Boja,Majenang,Cilacap,Jawa tengah</p>
    <p><span>Agama:</span> Islam</p>
    <p><span>Sekolah:</span> SMK Komputama Majenang</p>
  </div>

  <div class="footer">Profile Card</div>
</div>

</body>
</html>
